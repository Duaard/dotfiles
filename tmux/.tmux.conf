# --- Remap prefix to Ctrl-a (way easier than Ctrl-b) ---
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# --- Sensible defaults ---
set -g mouse on                    # scroll, click panes, resize with mouse
set -g base-index 1                # windows start at 1, not 0
setw -g pane-base-index 1          # panes too
set -g renumber-windows on         # re-number when you close a window
set -g history-limit 50000         # generous scrollback
set -sg escape-time 0              # no delay after pressing Esc (critical for vim/neovim)
set -g focus-events on             # needed for some editor integrations

# --- Better split keybinds (more intuitive) ---
bind % split-window -h -c "#{pane_current_path}"
bind * split-window -v -c "#{pane_current_path}"
unbind '"'

# --- New windows/panes inherit current directory ---
bind c new-window -c "#{pane_current_path}"

# --- Vim-style pane navigation ---
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# --- Pane resizing (hold prefix, then arrow repeatedly) ---
# bind -r H resize-pane -L 5
# bind -r J resize-pane -D 5
# bind -r K resize-pane -U 5
# bind -r L resize-pane -R 5

# --- Quick reload ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Status bar (clean and minimal) ---
set -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-left "#[bold]#S "
set -g status-right "%H:%M"
set -g window-status-current-format "#[bold,fg=cyan]#I:#W"
set -g window-status-format "#[fg=grey]#I:#W"

# --- True color support (important for Ghostty) ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:Tc"

# --- Pane management ---
bind o kill-pane -a
